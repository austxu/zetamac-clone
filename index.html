<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zetamac</title>
    <style>
        /* --- GLOBAL VARIABLES (Light Mode) --- */
        :root {
            --page-bg: #ffffff;
            --text-color: #000000;
            --section-bg: #f9f9f9;
            --section-border: #ccc;
            --input-bg: #ffffff;
            --input-border: #777;
            --btn-bg: #e0e0e0;
            --btn-border: #999;
            --btn-hover: #d0d0d0;

            /* Graph Colors (Light) */
            --chart-line: #007bff;
            --chart-grid: #ddd;
            --chart-text: #666;
            /* Tooltip: Dark box, white text */
            --chart-tooltip-bg: rgba(0, 0, 0, 0.8);
            --chart-tooltip-text: #fff;
            --chart-tooltip-sub: rgba(255, 255, 255, 0.7);
        }

        /* --- DARK MODE VARIABLES --- */
        body.dark-mode {
            --page-bg: #121212;
            --text-color: #e0e0e0;
            --section-bg: #1e1e1e;
            --section-border: #444;
            --input-bg: #2c2c2c;
            --input-border: #555;
            --btn-bg: #333;
            --btn-border: #555;
            --btn-hover: #444;

            /* Graph Colors (Dark) */
            --chart-line: #4dabf7;
            --chart-grid: #444;
            --chart-text: #aaa;
            /* Tooltip: Dark Grey box (easier on eyes), white text */
            --chart-tooltip-bg: rgba(50, 50, 50, 0.95);
            --chart-tooltip-text: #fff;
            --chart-tooltip-sub: rgba(255, 255, 255, 0.7);
        }

        /* Global Reset */
        * {
            font-family: 'Helvetica Neue', Arial, Helvetica, sans-serif;
            font-weight: normal;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        body {
            background-color: var(--page-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0 20px;
            font-size: 14px;
            color: var(--text-color);
            overflow: hidden;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-color);
            border-radius: 4px;
            z-index: 100;
        }

        .theme-toggle.hidden {
            display: none;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 650px;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- GRAY BOX SECTIONS (Classic) --- */
        .gray-section {
            border: 1px solid var(--section-border);
            background-color: var(--section-bg);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: left;
            width: 100%;
        }

        #start-screen .gray-section {
            margin-bottom: 15px;
            padding: 15px;
        }

        /* --- INTERNAL SETTINGS STYLING --- */
        .op-block {
            margin-bottom: 8px;
        }

        .op-header {
            display: flex;
            align-items: center;
            font-size: 15px;
            color: var(--text-color);
        }

        .op-settings {
            margin-left: 26px;
            margin-top: 2px;
            font-size: 14px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        input[type="checkbox"] {
            margin: 0 8px 0 0;
            transform: scale(1.2);
            cursor: pointer;
            accent-color: #007bff;
        }

        /* Inputs */
        input[type="number"] {
            padding: 4px 2px;
            text-align: center;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            font-size: 14px;
            line-height: 1.2;
            background-color: var(--input-bg);
            color: var(--text-color);
            -moz-appearance: textfield;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .range-input {
            width: 50px;
        }

        .duration-input {
            width: 60px;
        }

        .duration-area {
            margin-top: 15px;
            text-align: left;
            font-size: 15px;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 14px;
            display: none;
            margin-bottom: 10px;
            text-align: left;
            padding-left: 5px;
        }

        /* Buttons */
        button {
            padding: 6px 16px;
            font-size: 14px;
            color: var(--text-color);
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 3px;
            cursor: pointer;
            margin-top: 5px;
            margin-right: 10px;
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.05));
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        .btn-container {
            text-align: left;
            margin-bottom: 15px;
        }

        /* --- GAME/RESULTS OVERLAY --- */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--page-bg);
            z-index: 200;
        }

        #timer-display,
        #score-display {
            font-size: 18px;
            position: absolute;
            top: 20px;
            color: var(--text-color);
        }

        #timer-display {
            left: 20px;
        }

        #score-display {
            right: 20px;
        }

        .game-strip {
            text-align: center;
            margin-top: 240px;
            padding: 10px 0;
            line-height: 54px;
            font-size: 36px;
            background-color: #dddddd;
            width: 100%;
        }

        body.dark-mode .game-strip {
            background-color: #333;
        }

        .game-strip #game-content-area {
            display: inline-block;
        }

        .game-strip .question-text,
        .game-strip .equals-sign {
            font-size: 36px;
            color: var(--text-color);
            white-space: nowrap;
            vertical-align: middle;
        }

        #answer-input {
            font-size: 36px;
            font-family: inherit;
            width: 156px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            background-color: var(--input-bg);
            color: var(--text-color);
            text-align: left;
            padding: 4px 8px;
            vertical-align: middle;
            margin-left: 4px;
        }

        #answer-input:focus {
            outline: 2px solid #007bff;
            outline-offset: -1px;
            border-color: #007bff;
        }

        body.dark-mode #answer-input:focus {
            outline-color: #4dabf7;
            border-color: #4dabf7;
        }

        /* Results inside the strip */
        .result-score {
            font-size: 36px;
            color: var(--text-color);
            text-align: center;
            line-height: 56px;
        }

        .result-cpm {
            font-size: 18px;
            color: #007bff;
            text-align: center;
            line-height: 24px;
        }

        .result-links {
            font-size: 14px;
            line-height: 24px;
            text-align: center;
            margin: 0;
        }

        .result-links a {
            color: #007bff;
            cursor: pointer;
            text-decoration: underline;
        }

        .result-links a:hover {
            color: #0056b3;
        }

        /* Chart Wrapper */
        .chart-wrapper {
            height: 200px;
            width: 100%;
            position: relative;
            cursor: crosshair;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">Dark Mode</button>

    <div class="container">
        <div id="start-screen">

            <div class="gray-section">
                <div class="op-block">
                    <div class="op-header">
                        <input type="checkbox" id="add-check" checked>
                        <label for="add-check">Addition</label>
                    </div>
                    <div class="op-settings">
                        Range: (<input type="number" class="range-input" id="add-min" value="2"> to <input type="number"
                            class="range-input" id="add-max" value="100">) + (<input type="number" class="range-input"
                            id="add-min2" value="2"> to <input type="number" class="range-input" id="add-max2"
                            value="100">)
                    </div>
                </div>

                <div class="op-block">
                    <div class="op-header">
                        <input type="checkbox" id="sub-check" checked>
                        <label for="sub-check">Subtraction</label>
                    </div>
                    <div class="op-settings">
                        Addition problems in reverse.
                    </div>
                </div>

                <div class="op-block">
                    <div class="op-header">
                        <input type="checkbox" id="mult-check" checked>
                        <label for="mult-check">Multiplication</label>
                    </div>
                    <div class="op-settings">
                        Range: (<input type="number" class="range-input" id="mult-min" value="2"> to <input
                            type="number" class="range-input" id="mult-max" value="12">) &times; (<input type="number"
                            class="range-input" id="mult-min2" value="2"> to <input type="number" class="range-input"
                            id="mult-max2" value="100">)
                    </div>
                </div>

                <div class="op-block">
                    <div class="op-header">
                        <input type="checkbox" id="div-check" checked>
                        <label for="div-check">Division</label>
                    </div>
                    <div class="op-settings">
                        Multiplication problems in reverse.
                    </div>
                </div>

                <div class="duration-area">
                    <label>Duration (seconds):</label>
                    <input type="number" class="duration-input" id="duration-input" value="120">
                </div>
            </div>

            <p id="config-error" class="error-msg">Please select at least one operation.</p>

            <div class="btn-container">
                <button onclick="startGame()">Start</button>
            </div>

            <div class="gray-section" style="padding: 10px;">
                <div class="chart-wrapper">
                    <canvas id="customGraph"></canvas>
                </div>
            </div>

            <div class="btn-container">
                <button onclick="exportHistory()">Export Log</button>
                <button onclick="document.getElementById('import-file').click()">Import Log</button>
                <button onclick="clearHistory()">Clear History</button>
                <input type="file" id="import-file" accept=".csv" style="display:none" onchange="importHistory(event)">
            </div>
        </div>

        <div id="game-overlay">
            <span id="timer-display">Seconds left: 120</span>
            <span id="score-display">Score: 0</span>

            <div class="game-strip" id="game-strip">
                <!-- Game mode: question = input -->
                <div id="game-content-area">
                    <span class="question-text" id="question-text"></span>
                    <span class="equals-sign">=</span>
                    <input type="number" id="answer-input" autocomplete="off">
                </div>
                <!-- Results mode: score + links -->
                <div id="results-area" style="display:none;">
                    <div class="result-score">Score: <span id="final-score">0</span></div>
                    <div class="result-links">
                        <a onclick="startGame()">Try again</a> or <a onclick="goToSettings()">change settings</a>.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('zetamac_dark_mode', isDark);
            updateThemeButton();
            drawGraph();
        }

        function updateThemeButton() {
            const btn = document.getElementById('theme-btn');
            const isDark = document.body.classList.contains('dark-mode');
            // If Dark Mode is ON, button says "Light Mode"
            // If Dark Mode is OFF, button says "Dark Mode"
            btn.innerText = isDark ? "Light Mode" : "Dark Mode";
        }

        // Init Theme on Load
        if (localStorage.getItem('zetamac_dark_mode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        // Set initial text
        window.addEventListener('DOMContentLoaded', updateThemeButton);

        // --- GAME STATE ---
        let score = 0;
        let duration = 120;
        let timeLeft = 0;
        let currentAnswer = null;
        let timerInterval;
        let history = JSON.parse(localStorage.getItem('zetamac_history_v2')) || [];
        let activeOps = [];

        // --- DOM ---
        const themeBtn = document.getElementById('theme-btn');
        const startScreen = document.getElementById('start-screen');
        const gameOverlay = document.getElementById('game-overlay');
        const gameContentArea = document.getElementById('game-content-area');
        const resultsArea = document.getElementById('results-area');
        const qText = document.getElementById('question-text');
        const ansInput = document.getElementById('answer-input');
        const timeDisplay = document.getElementById('timer-display');
        const scoreDisplay = document.getElementById('score-display');
        const errorMsg = document.getElementById('config-error');
        const canvas = document.getElementById('customGraph');
        let hoverIndex = -1;

        // --- INIT ---
        loadSettings();
        setTimeout(drawGraph, 50);
        window.addEventListener('resize', drawGraph);

        // --- CANVAS INTERACTION ---
        canvas.addEventListener('mousemove', (e) => {
            if (!history.length) return;
            const rect = canvas.getBoundingClientRect();
            // Adjust for padding inside chart drawing function
            const padLeft = 35;
            const padRight = 15;
            const chartW = rect.width - padLeft - padRight;
            const x = e.clientX - rect.left - padLeft;

            const stepX = history.length > 1 ? chartW / (history.length - 1) : 0;
            let idx = Math.round(x / stepX);

            if (idx < 0) idx = 0;
            if (idx >= history.length) idx = history.length - 1;

            if (hoverIndex !== idx) {
                hoverIndex = idx;
                drawGraph();
            }
        });

        canvas.addEventListener('click', () => {
            if (hoverIndex !== -1 && history.length > hoverIndex) {
                if (confirm(`Delete score ${history[hoverIndex].score} from history?`)) {
                    history.splice(hoverIndex, 1);
                    localStorage.setItem('zetamac_history_v2', JSON.stringify(history));
                    hoverIndex = -1;
                    drawGraph();
                }
            }
        });

        canvas.addEventListener('mouseleave', () => {
            hoverIndex = -1;
            drawGraph();
        });

        // --- NAVIGATION ---
        function goToSettings() {
            gameOverlay.style.display = 'none';
            startScreen.style.display = 'block';
            themeBtn.classList.remove('hidden');
            drawGraph();
        }

        function startGame() {
            const add = document.getElementById('add-check').checked;
            const sub = document.getElementById('sub-check').checked;
            const mult = document.getElementById('mult-check').checked;
            const div = document.getElementById('div-check').checked;

            activeOps = [];
            if (add) activeOps.push('add');
            if (sub) activeOps.push('sub');
            if (mult) activeOps.push('mult');
            if (div) activeOps.push('div');

            if (activeOps.length === 0) {
                errorMsg.style.display = 'block';
                return;
            }
            errorMsg.style.display = 'none';
            saveSettings();

            duration = parseInt(document.getElementById('duration-input').value) || 120;
            timeLeft = duration;
            score = 0;

            startScreen.style.display = 'none';
            gameOverlay.style.display = 'block';
            gameContentArea.style.display = 'inline-block';
            resultsArea.style.display = 'none';
            themeBtn.classList.add('hidden');

            updateStats();
            generateQuestion();

            ansInput.value = '';
            ansInput.focus();

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeLeft--;
                updateStats();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateStats() {
            timeDisplay.innerText = `Seconds left: ${timeLeft}`;
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function generateQuestion() {
            const type = activeOps[Math.floor(Math.random() * activeOps.length)];
            let a, b, text;

            const addMin1 = parseInt(document.getElementById('add-min').value);
            const addMax1 = parseInt(document.getElementById('add-max').value);
            const addMin2 = parseInt(document.getElementById('add-min2').value);
            const addMax2 = parseInt(document.getElementById('add-max2').value);

            const multMin1 = parseInt(document.getElementById('mult-min').value);
            const multMax1 = parseInt(document.getElementById('mult-max').value);
            const multMin2 = parseInt(document.getElementById('mult-min2').value);
            const multMax2 = parseInt(document.getElementById('mult-max2').value);

            switch (type) {
                case 'add':
                    a = rInt(addMin1, addMax1);
                    b = rInt(addMin2, addMax2);
                    text = `${a} + ${b}`;
                    currentAnswer = a + b;
                    break;
                case 'sub':
                    a = rInt(addMin1, addMax1);
                    b = rInt(addMin2, addMax2);
                    let sum = a + b;
                    text = `${sum} - ${a}`;
                    currentAnswer = b;
                    break;
                case 'mult':
                    if (Math.random() > 0.5) {
                        a = rInt(multMin1, multMax1);
                        b = rInt(multMin2, multMax2);
                    } else {
                        a = rInt(multMin2, multMax2);
                        b = rInt(multMin1, multMax1);
                    }
                    text = `${a} × ${b}`;
                    currentAnswer = a * b;
                    break;
                case 'div':
                    a = rInt(multMin1, multMax1);
                    b = rInt(multMin2, multMax2);
                    let prod = a * b;
                    text = `${prod} ÷ ${a}`;
                    currentAnswer = b;
                    break;
            }
            qText.innerText = text;
        }

        function rInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        ansInput.addEventListener('input', () => {
            if (!ansInput.value) return;
            const val = parseInt(ansInput.value);
            if (val === currentAnswer) {
                score++;
                updateStats();
                ansInput.value = '';
                generateQuestion();
            }
        });

        function endGame() {
            clearInterval(timerInterval);
            gameContentArea.style.display = 'none';
            resultsArea.style.display = 'block';
            themeBtn.classList.remove('hidden');

            const cpm = parseFloat((score / (duration / 60)).toFixed(2));
            document.getElementById('final-score').innerText = score;

            const now = new Date();
            const entry = {
                ts: now.getTime(),
                cpm: cpm,
                score: score,
                duration: duration
            };
            history.push(entry);
            localStorage.setItem('zetamac_history_v2', JSON.stringify(history));
        }

        function saveSettings() {
            const settings = {
                add: document.getElementById('add-check').checked,
                sub: document.getElementById('sub-check').checked,
                mult: document.getElementById('mult-check').checked,
                div: document.getElementById('div-check').checked,
                addMin: document.getElementById('add-min').value,
                addMax: document.getElementById('add-max').value,
                addMin2: document.getElementById('add-min2').value,
                addMax2: document.getElementById('add-max2').value,
                multMin: document.getElementById('mult-min').value,
                multMax: document.getElementById('mult-max').value,
                multMin2: document.getElementById('mult-min2').value,
                multMax2: document.getElementById('mult-max2').value,
                duration: document.getElementById('duration-input').value
            };
            localStorage.setItem('zetamac_settings', JSON.stringify(settings));
        }

        function loadSettings() {
            const s = JSON.parse(localStorage.getItem('zetamac_settings'));
            if (s) {
                document.getElementById('add-check').checked = s.add;
                document.getElementById('sub-check').checked = s.sub;
                document.getElementById('mult-check').checked = s.mult;
                document.getElementById('div-check').checked = s.div;
                document.getElementById('add-min').value = s.addMin;
                document.getElementById('add-max').value = s.addMax;
                document.getElementById('add-min2').value = s.addMin2;
                document.getElementById('add-max2').value = s.addMax2;
                document.getElementById('mult-min').value = s.multMin;
                document.getElementById('mult-max').value = s.multMax;
                document.getElementById('mult-min2').value = s.multMin2;
                document.getElementById('mult-max2').value = s.multMax2;
                document.getElementById('duration-input').value = s.duration || 120;
            }
        }

        // --- DRAW OFFLINE GRAPH ---
        function drawGraph() {
            if (!canvas || !history.length) return;
            const ctx = canvas.getContext('2d');
            const rect = canvas.parentElement.getBoundingClientRect();

            // High DPI Support
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width;
            const h = rect.height;

            // Fetch current theme colors
            const style = getComputedStyle(document.body);
            const lineColor = style.getPropertyValue('--chart-line').trim();
            const gridColor = style.getPropertyValue('--chart-grid').trim();
            const textColor = style.getPropertyValue('--chart-text').trim();
            const tooltipBg = style.getPropertyValue('--chart-tooltip-bg').trim();
            const tooltipText = style.getPropertyValue('--chart-tooltip-text').trim();
            const tooltipSub = style.getPropertyValue('--chart-tooltip-sub').trim();
            const isDark = document.body.classList.contains('dark-mode');

            ctx.clearRect(0, 0, w, h);

            const padTop = 20;
            const padBottom = 30;
            const padLeft = 35;
            const padRight = 15;

            const chartW = w - padLeft - padRight;
            const chartH = h - padTop - padBottom;

            // Y-Axis Range
            let maxVal = 0, minVal = Infinity;
            history.forEach(pt => {
                if (pt.cpm > maxVal) maxVal = pt.cpm;
                if (pt.cpm < minVal) minVal = pt.cpm;
            });
            if (minVal === Infinity) minVal = 0;
            minVal = Math.max(0, minVal - 5);
            maxVal += 5;
            const range = maxVal - minVal || 1;

            // Draw Grid
            ctx.lineWidth = 1;
            ctx.font = "11px Helvetica Neue, Arial";
            ctx.textAlign = "right";
            ctx.textBaseline = "middle";

            ctx.setLineDash([4, 4]); // Dashed grid

            const ySteps = 4;
            for (let i = 0; i <= ySteps; i++) {
                const ratio = i / ySteps;
                const val = minVal + (range * ratio);
                const y = padTop + chartH - (chartH * ratio);

                // Grid Line
                ctx.strokeStyle = gridColor;
                ctx.beginPath();
                ctx.moveTo(padLeft, y);
                ctx.lineTo(w - padRight, y);
                ctx.stroke();

                // Label
                ctx.fillStyle = textColor;
                ctx.setLineDash([]);
                ctx.fillText(Math.round(val), padLeft - 8, y);
                ctx.setLineDash([4, 4]);
            }
            ctx.setLineDash([]);

            // Draw Line
            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            history.forEach((pt, i) => {
                const x = padLeft + (i * (chartW / Math.max(1, history.length - 1)));
                const normalizedY = (pt.cpm - minVal) / range;
                const y = (padTop + chartH) - (normalizedY * chartH);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // Draw Dates (X-Axis)
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.fillStyle = textColor;
            const maxLabels = 6;
            const step = Math.ceil(history.length / maxLabels);

            history.forEach((pt, i) => {
                if (i % step === 0 || i === history.length - 1) {
                    const x = padLeft + (i * (chartW / Math.max(1, history.length - 1)));
                    let dateStr = "";
                    if (pt.ts) {
                        const d = new Date(pt.ts);
                        dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
                    } else if (pt.date) {
                        const d = new Date(pt.date);
                        if (!isNaN(d)) dateStr = `${d.getMonth() + 1}/${d.getDate()}`;
                    }
                    ctx.fillText(dateStr, x, padTop + chartH + 8);
                }
            });

            // Hover Tooltip
            if (hoverIndex !== -1) {
                const pt = history[hoverIndex];
                const x = padLeft + (hoverIndex * (chartW / Math.max(1, history.length - 1)));
                const y = (padTop + chartH) - ((pt.cpm - minVal) / range * chartH);

                // Dot
                ctx.fillStyle = lineColor;
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, 2 * Math.PI);
                ctx.fill();
                // Ring
                ctx.strokeStyle = isDark ? '#1e1e1e' : '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Text Gen
                let dText = "Date";
                if (pt.ts) {
                    const d = new Date(pt.ts);
                    dText = d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                const txt1 = `CPM: ${pt.cpm}`;
                const txt2 = `Score: ${pt.score} (${pt.duration}s)`;
                const txt3 = dText;

                ctx.font = "12px Helvetica Neue, Arial";
                const m1 = ctx.measureText(txt1).width;
                const m2 = ctx.measureText(txt2).width;
                const m3 = ctx.measureText(txt3).width;
                const bw = Math.max(m1, m2, m3) + 20;
                const bh = 68; // Increased height for the extra text

                let bx = x - bw / 2;
                let by = y - bh - 10;
                if (bx < 0) bx = 5;
                if (bx + bw > w) bx = w - bw - 5;
                if (by < 0) by = y + 15;

                // Box
                ctx.fillStyle = tooltipBg;
                ctx.beginPath();
                ctx.roundRect(bx, by, bw, bh, 4);
                ctx.fill();

                // Text
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = tooltipText;
                ctx.font = "bold 12px Helvetica Neue, Arial";
                ctx.fillText(txt1, bx + bw / 2, by + 12);
                ctx.font = "12px Helvetica Neue, Arial";
                ctx.fillText(txt2, bx + bw / 2, by + 28);
                ctx.fillStyle = tooltipSub;
                ctx.font = "11px Helvetica Neue, Arial";
                ctx.fillText(txt3, bx + bw / 2, by + 42);

                // Add "Click to delete" text
                ctx.fillStyle = "#ff6b6b";
                ctx.font = "10px Helvetica Neue, Arial";
                ctx.fillText("(Click to delete)", bx + bw / 2, by + 55);
            }
        }

        function clearHistory() {
            if (confirm("Delete all history?")) {
                localStorage.removeItem('zetamac_history_v2');
                history = [];
                drawGraph();
            }
        }

        // --- FILE-BASED SCORE LOG ---
        function historyToCSV() {
            let csv = 'Date,Time,Score,Duration_Seconds,CPM\n';
            history.forEach(entry => {
                const d = new Date(entry.ts);
                const date = d.toLocaleDateString();
                const time = d.toLocaleTimeString();
                csv += `${date},${time},${entry.score},${entry.duration},${entry.cpm}\n`;
            });
            return csv;
        }

        function autoSaveCSV() {
            const csv = historyToCSV();
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'zetamac_scores.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        }

        function exportHistory() {
            if (!history.length) {
                alert('No history to export.');
                return;
            }
            autoSaveCSV();
        }

        function importHistory(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                const lines = e.target.result.trim().split('\n');
                const imported = [];
                // Skip header row
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(',');
                    if (cols.length >= 5) {
                        const dateTime = new Date(cols[0] + ' ' + cols[1]);
                        imported.push({
                            ts: dateTime.getTime(),
                            score: parseInt(cols[2]),
                            duration: parseInt(cols[3]),
                            cpm: parseFloat(cols[4])
                        });
                    }
                }
                if (imported.length) {
                    history = imported;
                    localStorage.setItem('zetamac_history_v2', JSON.stringify(history));
                    drawGraph();
                    alert(`Imported ${imported.length} scores.`);
                } else {
                    alert('No valid scores found in file.');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // reset so same file can be re-imported
        }
    </script>
